name: "Content Creation Pipeline"
pattern: "pipeline"
stages:
  - name: "research"
    agent: "data-collector"
  - name: "draft"
    agent: "content-writer"
  - name: "edit"
    agent: "editor"
  - name: "publish"
    agent: "publisher"
gates:
  - after: "draft"
    validator: "editor"
  - after: "edit"
    validator: "publisher"
task: "Create a comprehensive guide on AI Agent architecture"
failureStrategy: "stop"
